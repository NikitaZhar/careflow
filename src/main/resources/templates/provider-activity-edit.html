<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование услуги</title>
</head>
<body>

<div style="margin-bottom: 20px;">
    <p>
        Вы вошли как:
        <strong th:text="${currentUser.username}"></strong>
        (<span th:text="${currentUser.role}"></span>)
    </p>
    <p>
        Email:
        <span th:text="${currentUser.email}"></span>
    </p>
    <a th:href="@{/auth/logout}">Logout</a>
</div>

<h2>Редактирование услуги</h2>

<form id="activityForm"
      th:action="@{/provider/activities/{id}(id=${activity.id})}"
      method="post">

    <div>
        <label for="title">Название:</label>
        <input id="title"
               type="text"
               name="title"
               th:value="${activity.title}"
               required>
    </div>

    <div style="margin-top: 10px;">
        <label for="description">Описание:</label>
        <textarea id="description"
                  name="description"
                  rows="4"
                  cols="50"
                  required
                  th:text="${activity.description}"></textarea>
    </div>

    <div style="margin-top: 10px;">
        <label for="price">Цена:</label>
        <input id="price"
               type="number"
               name="price"
               step="0.01"
               min="0.01"
               th:value="${activity.price}"
               required>
    </div>

    <div style="margin-top: 10px;">
        <label for="durationMinutes">Длительность (мин):</label>
        <input id="durationMinutes"
               type="number"
               name="durationMinutes"
               min="1"
               th:value="${activity.durationMinutes}"
               required>
    </div>
</form>

<div style="margin-top: 20px;">
    <button type="submit" form="activityForm">Сохранить</button>

    <button type="button"
            onclick="window.location.href='/provider'"
            style="margin-left: 10px;">
        Назад
    </button>

    <form th:action="@{/provider/activities/{id}/delete(id=${activity.id})}"
          method="post"
          style="display: inline; margin-left: 10px;"
          onsubmit="return confirm('Удалить услугу?');">
        <button type="submit">Удалить</button>
    </form>
</div>

<hr style="margin: 30px 0;">

<h3>Базовые правила расписания</h3>

<div th:if="${#lists.isEmpty(scheduleRules)}" style="margin-top: 10px;">
    <p>Правила расписания пока не добавлены.</p>
</div>

<table th:if="${not #lists.isEmpty(scheduleRules)}" style="margin-top: 10px;">
    <thead>
        <tr>
            <th>День недели</th>
            <th>Начало</th>
            <th>Конец</th>
            <th>Ближайшие даты</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="rule : ${scheduleRules}">
            <td th:text="${rule.dayOfWeek}"></td>
            <td th:text="${#temporals.format(rule.startTime, 'HH:mm')}"></td>
            <td th:text="${#temporals.format(rule.endTime, 'HH:mm')}"></td>
            <td>
                <span>ближайшие даты: </span>
                <span th:text="${rulePreviewDates[rule.id]}"></span>
            </td>
            <td>
                <form th:action="@{/provider/activities/{activityId}/schedule-rules/{ruleId}/delete(activityId=${activity.id}, ruleId=${rule.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить правило расписания?');">
                    <button type="submit">Удалить</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<div style="margin-top: 20px;">
    <h4>Добавить правило</h4>

    <form th:action="@{/provider/activities/{id}/schedule-rules(id=${activity.id})}"
          method="post">

        <div>
            <label for="dayOfWeek">День недели:</label>
            <select id="dayOfWeek" name="dayOfWeek" required>
                <option value="">Выберите день</option>
                <option value="MONDAY">MONDAY</option>
                <option value="TUESDAY">TUESDAY</option>
                <option value="WEDNESDAY">WEDNESDAY</option>
                <option value="THURSDAY">THURSDAY</option>
                <option value="FRIDAY">FRIDAY</option>
                <option value="SATURDAY">SATURDAY</option>
                <option value="SUNDAY">SUNDAY</option>
            </select>
        </div>

        <div style="margin-top: 10px;">
            <label for="ruleStartTime">Начало:</label>
            <input id="ruleStartTime"
                   type="time"
                   name="startTime"
                   required>
        </div>

        <div style="margin-top: 10px;">
            <label for="ruleEndTime">Конец:</label>
            <input id="ruleEndTime"
                   type="time"
                   name="endTime"
                   required>
        </div>

        <div style="margin-top: 15px;">
            <button type="submit">Добавить правило</button>
        </div>
    </form>
</div>

<hr style="margin: 30px 0;">

<h3>Корректировки</h3>

<div th:if="${scheduleOverrideError}" style="margin-top: 10px;">
    <p th:text="${scheduleOverrideError}" style="color: red;"></p>
</div>

<div th:if="${#lists.isEmpty(scheduleOverrides)}" style="margin-top: 10px;">
    <p>Корректировки пока не добавлены.</p>
</div>

<table th:if="${not #lists.isEmpty(scheduleOverrides)}" style="margin-top: 10px;">
    <thead>
        <tr>
            <th>Дата</th>
            <th>Начало</th>
            <th>Конец</th>
            <th>Тип</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="scheduleOverride : ${scheduleOverrides}">
            <td th:text="${#temporals.format(scheduleOverride.date, 'dd.MM.yyyy')}"></td>
            <td th:text="${#temporals.format(scheduleOverride.startTime, 'HH:mm')}"></td>
            <td th:text="${#temporals.format(scheduleOverride.endTime, 'HH:mm')}"></td>
            <td th:text="${scheduleOverride.type}"></td>
            <td>
                <form th:action="@{/provider/activities/{activityId}/schedule-overrides/{overrideId}/delete(activityId=${activity.id}, overrideId=${scheduleOverride.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить корректировку?');">
                    <button type="submit">Удалить</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<div style="margin-top: 20px;">
    <h4>Добавить корректировку</h4>

    <form th:action="@{/provider/activities/{id}/schedule-overrides(id=${activity.id})}"
          method="post">

        <div>
            <label for="overrideDate">Дата:</label>
            <input id="overrideDate"
                   type="date"
                   name="date"
                   required>
        </div>

        <div style="margin-top: 10px;">
            <label for="overrideStartTime">Начало:</label>
            <input id="overrideStartTime"
                   type="time"
                   name="startTime"
                   required>
        </div>

        <div style="margin-top: 10px;">
            <label for="overrideEndTime">Конец:</label>
            <input id="overrideEndTime"
                   type="time"
                   name="endTime"
                   required>
        </div>

        <div style="margin-top: 10px;">
            <label for="overrideType">Тип:</label>
            <select id="overrideType" name="type" required>
                <option value="">Выберите тип</option>
                <option value="AVAILABLE">Доступно</option>
                <option value="UNAVAILABLE">Недоступно</option>
            </select>
        </div>

        <div style="margin-top: 15px;">
            <button type="submit">Добавить корректировку</button>
        </div>
    </form>
</div>

</body>
</html>
