<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2, h3 {
            margin-top: 30px;
        }

        .user-info {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .message {
            color: green;
            margin-top: 10px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .section {
            margin-top: 25px;
        }

        .form-block {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea, select {
            width: 300px;
            padding: 5px;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 7px 15px;
            cursor: pointer;
        }

        table {
            margin-top: 15px;
            border-collapse: collapse;
            width: 100%;
            max-width: 800px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
        }

        hr {
            margin: 30px 0;
        }
    </style>
</head>
<body>

<!-- ===== Информация о текущем пользователе ===== -->
<div class="user-info">
    <p>
        Вы вошли как:
        <strong th:text="${currentUser.username}">username</strong>
        (<span th:text="${currentUser.role}">PROVIDER</span>)
    </p>
    <p>
        Email:
        <span th:text="${currentUser.email}">email@example.com</span>
    </p>
    <a th:href="@{/auth/logout}">Logout</a>
</div>

<h2>Панель провайдера</h2>

<!-- ===== Сообщения ===== -->
<div th:if="${message}" class="message">
    <p th:text="${message}"></p>
</div>

<div th:if="${error}" class="error">
    <p th:text="${error}"></p>
</div>

<!-- ===================================================== -->
<!-- ===== Приглашение клиента ===== -->
<!-- ===================================================== -->
<div class="section">
    <h3>Пригласить клиента</h3>

    <button id="showClientInviteButton" type="button" onclick="showClientInviteForm()">
        Пригласить клиента
    </button>

    <div id="clientInviteForm" class="form-block" style="display: none;">
        <form th:action="@{/provider/clients/invite}" method="post">
            <label for="clientEmail">Email клиента:</label>
            <input id="clientEmail"
                   type="email"
                   name="email"
                   placeholder="client@example.com"
                   required>

            <button type="submit">Отправить приглашение</button>
        </form>
    </div>
</div>

<!-- ===================================================== -->
<!-- ===== Список клиентов провайдера ===== -->
<!-- ===================================================== -->
<div class="section">
    <h3>Мои клиенты</h3>

    <div th:if="${#lists.isEmpty(clients)}">
        <p>Список клиентов пуст</p>
    </div>

    <table th:if="${not #lists.isEmpty(clients)}">
        <thead>
            <tr>
                <th>№</th>
                <th>Username</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="client, stat : ${clients}">
                <td th:text="${stat.index + 1}">1</td>
                <td th:text="${client.username}">client1</td>
                <td th:text="${client.email}">client@example.com</td>
            </tr>
        </tbody>
    </table>
</div>

<hr>

<!-- ===================================================== -->
<!-- ===== Создание новой услуги ===== -->
<!-- ===================================================== -->
<div class="section">
    <h3>Мои активности</h3>

    <button id="addButton" type="button" onclick="showActivityForm()">
        Добавить услугу
    </button>

    <div id="activityForm" class="form-block" style="display: none;">
        <form th:action="@{/provider/activities}"
              method="post"
              enctype="multipart/form-data">

            <label for="title">Название:</label>
            <input id="title"
                   type="text"
                   name="title"
                   placeholder="Введите название услуги"
                   required>

            <label for="description">Описание:</label>
            <textarea id="description"
                      name="description"
                      rows="4"
                      placeholder="Опишите услугу"
                      required></textarea>

            <label for="price">Цена:</label>
            <input id="price"
                   type="number"
                   name="price"
                   step="0.01"
                   min="0.01"
                   placeholder="Например: 1000"
                   required>

            <label for="durationMinutes">Длительность (мин):</label>
            <input id="durationMinutes"
                   type="number"
                   name="durationMinutes"
                   min="1"
                   placeholder="Например: 60"
                   required>

            <label for="document">Загрузить текстовый или PDF файл:</label>
            <input id="document"
                   type="file"
                   name="document"
                   accept=".txt,.pdf">

            <label for="video">Загрузить видео файл:</label>
            <input id="video"
                   type="file"
                   name="video"
                   accept="video/*">

            <button type="submit">Создать услугу</button>
        </form>
    </div>

    <!-- ===== Список услуг ===== -->
    <div th:if="${#lists.isEmpty(activities)}">
        <p>Список активностей пуст</p>
    </div>

    <table th:if="${not #lists.isEmpty(activities)}">
        <thead>
            <tr>
                <th>№</th>
                <th>Услуга</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="activity, stat : ${activities}">
                <td th:text="${stat.index + 1}">1</td>
                <td>
                    <a th:href="@{/provider/activities/{id}(id=${activity.id})}"
                       style="text-decoration: none; color: inherit;">
                        <strong th:text="${activity.title}">Title</strong>
                        <span> — </span>
                        <span th:text="${activity.description}">Description</span>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- ===================================================== -->
<!-- ===== JavaScript ===== -->
<!-- ===================================================== -->
<script>
    function showActivityForm() {
        document.getElementById('activityForm').style.display = 'block';
        document.getElementById('addButton').style.display = 'none';
    }

    function showClientInviteForm() {
        document.getElementById('clientInviteForm').style.display = 'block';
        document.getElementById('showClientInviteButton').style.display = 'none';
    }
</script>

</body>
</html>
